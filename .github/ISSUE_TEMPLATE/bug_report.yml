name: 🐞 Bug report
description: Report something not working in Sonora
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! The more context (OS, install
        method, version, provider, logs), the faster it can be fixed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched the existing issues (open and closed).
          required: true
        - label: I'm on the latest available version (or I state which one below).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happens? What did you expect instead?
      placeholder: Describe the observed behavior and the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The most precise list to reproduce the bug.
      placeholder: |
        1. Open Settings…
        2. Select the provider…
        3. Click the mic…
        4. See the error…
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sonora version
      description: Shown in the app, or the tag of the build you downloaded.
      placeholder: "e.g. v0.2.11"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux — Wayland (Hyprland, GNOME, KDE…)
        - Linux — X11
        - macOS — Apple Silicon (aarch64)
        - macOS — Intel (x64)
        - Windows
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - AppImage (Linux)
        - .deb package (Linux)
        - "nix run / nix build (NixOS)"
        - .dmg (macOS)
        - .msi or .exe setup (Windows)
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Transcription provider
      description: The engine configured when the bug happened (if relevant).
      options:
        - Not relevant / not sure
        - Gemini Live (streaming)
        - OpenAI
        - Groq
        - Mistral / Voxtral
        - OpenAI-compatible (custom endpoint)
        - Local Whisper
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: |
        Run from a terminal, Sonora prints logs (e.g. `[sonora:audio] …`).
        Paste any relevant message here. **Never paste an API key.**
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, Hyprland config, hardware specifics (USB mic…), etc.
    validations:
      required: false
