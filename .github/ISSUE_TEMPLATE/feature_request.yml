name: 💡 Feature request
description: Suggest an improvement or a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe the **need** (the problem to solve)
        before the solution — it helps find the best approach.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched the existing issues (open and closed).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The need or frustration behind the request.
      placeholder: "As a user, I want… so that…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine the feature working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you thought about.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Platforms affected
      options:
        - All
        - Linux
        - macOS
        - Windows
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other apps, useful links…
    validations:
      required: false
