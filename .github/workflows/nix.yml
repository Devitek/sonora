name: Nix

# Build the native Nix package so packaging regressions (flake, frontend FOD
# hash, cargoLock, runtime wrapping) are caught. Only runs when packaging-
# relevant files change — doc-only pushes don't trigger this heavier job.
on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - "index.html"
      - "vite.config.ts"
      - "svelte.config.js"
      - "tsconfig*.json"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - "index.html"
      - "vite.config.ts"
      - "svelte.config.js"
      - "tsconfig*.json"
      - ".github/workflows/nix.yml"

permissions:
  contents: read

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: nix build .#default
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build the package
        run: nix build .#default -L
