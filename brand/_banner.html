<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Space Grotesk',sans-serif; }
  .banner {
    width:900px; height:340px; position:relative; overflow:hidden;
    background:linear-gradient(135deg,#0e1019 0%,#141022 55%,#0a1418 100%);
    display:flex; align-items:center; justify-content:center; gap:34px;
  }
  .glow1 { position:absolute; width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,92,255,0.28), transparent 60%);
    left:-120px; top:-200px; }
  .glow2 { position:absolute; width:560px; height:560px; border-radius:50%;
    background:radial-gradient(circle, rgba(34,211,238,0.22), transparent 60%);
    right:-140px; bottom:-220px; }
  .icon { position:relative; width:124px; height:124px; border-radius:30px;
    background:linear-gradient(140deg,#7C5CFF,#22D3EE);
    box-shadow:0 18px 50px rgba(124,92,255,0.5), 0 8px 26px rgba(34,211,238,0.3);
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .icon span { width:8px; border-radius:4px; background:#fff; }
  .b1 { height:30px; opacity:0.95; } .b2 { height:56px; } .b3 { height:84px; } .b4 { height:56px; } .b5 { height:30px; opacity:0.95; }
  .text { position:relative; }
  .name { font-weight:600; font-size:74px; letter-spacing:-0.03em; color:#f3f4fa; line-height:1; }
  .tag { font-family:'JetBrains Mono',monospace; font-size:14.5px; color:#8a91a6; margin-top:15px; letter-spacing:0.01em; }
  .chips { display:flex; gap:8px; margin-top:18px; }
  .chip { font-family:'JetBrains Mono',monospace; font-size:11px; color:#c3b5ff;
    background:rgba(124,92,255,0.14); border:1px solid rgba(124,92,255,0.3);
    border-radius:20px; padding:5px 11px; white-space:nowrap; }
</style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="glow1"></div><div class="glow2"></div>
    <div class="icon">
      <span class="b1"></span><span class="b2"></span><span class="b3"></span><span class="b4"></span><span class="b5"></span>
    </div>
    <div class="text">
      <div class="name" id="name">Sonora</div>
      <div class="tag" id="tag">votre voix, en clair — partout, instantané</div>
      <div class="chips">
        <span class="chip">⌘ hotkey</span>
        <span class="chip">cloud + local</span>
        <span class="chip">colle au curseur</span>
      </div>
    </div>
  </div>
</body>
</html>
